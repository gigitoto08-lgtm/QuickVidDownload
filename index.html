<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>QuickVideoDownloader - TikTok Instagram X YouTube Downloader</title>

<meta name="description" content="Download TikTok, Instagram Reels, Twitter X videos and YouTube Shorts instantly and free.">
<meta name="keywords" content="tiktok downloader, instagram downloader, twitter video downloader, youtube shorts downloader">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
font-family:Inter;
margin:0;
color:white;
background:linear-gradient(270deg,#000000,#0a0015,#00132a,#220015);
background-size:600% 600%;
animation:bgmove 15s infinite alternate;
min-height:100vh;
}

@keyframes bgmove{
0%{background-position:0%}
100%{background-position:100%}
}

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
background:rgba(0,0,0,.4);
}

.logo{
font-size:32px;
font-weight:700;
background:linear-gradient(90deg,#ff004c,#7c3aed,#00c3ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.wrapper{
max-width:1100px;
margin:auto;
padding:40px 20px;
text-align:center;
}

.card{
background:rgba(0,0,0,.5);
padding:35px;
border-radius:22px;
}

.input-area{
display:flex;
gap:10px;
}

input{
flex:1;
padding:16px;
border-radius:40px;
border:none;
background:#0b0716;
color:white;
}

button{
padding:14px 24px;
border:none;
border-radius:40px;
background:linear-gradient(135deg,#ff004c,#7c3aed,#00c3ff);
color:white;
cursor:pointer;
}

.preview{
margin-top:25px;
display:none;
}

.preview img{
max-width:300px;
border-radius:12px;
}

video{
max-width:400px;
margin-top:15px;
border-radius:12px;
}

.download-area{
margin-top:20px;
display:none;
}

footer{
margin-top:80px;
opacity:.6;
}

</style>
</head>

<body>

<div class="navbar">
<div class="logo">QuickVideoDownloader</div>
</div>

<div class="wrapper">

<p>Download videos from TikTok, Instagram, X and YouTube instantly</p>

<div class="card">

<div class="input-area">
<input id="urlInput" placeholder="Paste TikTok video link here">
<button onclick="analyzeVideo()">Analyze</button>
</div>

<div class="preview" id="preview">

<h3>Video Preview</h3>

<img id="thumb">

<br>

<video id="player" controls></video>

<p id="author"></p>
<p id="duration"></p>

</div>

<div class="download-area" id="downloadArea">

<button onclick="downloadVideo()">
<i class="fa fa-download"></i> Download Video
</button>

<br><br>

<button onclick="downloadMP3()">
<i class="fa fa-music"></i> Download MP3
</button>

</div>

</div>

<footer>
© 2025 QuickVideoDownloader
</footer>

</div>

<script>

let videoURL=""
let audioURL=""

async function analyzeVideo(){

const url=document.getElementById("urlInput").value.trim()

if(!url){
alert("Paste video link")
return
}

try{

const api="https://www.tikwm.com/api/?url="+encodeURIComponent(url)

const res=await fetch(api)

const json=await res.json()

if(json.data){

videoURL=json.data.play
audioURL=json.data.music

document.getElementById("thumb").src=json.data.cover

document.getElementById("player").src=videoURL

document.getElementById("author").innerText="Author: "+json.data.author.nickname

document.getElementById("duration").innerText="Duration: "+json.data.duration+" sec"

document.getElementById("preview").style.display="block"

document.getElementById("downloadArea").style.display="block"

}else{

alert("Video not found")

}

}catch(e){

alert("Failed to analyze video")

}

}

function downloadVideo(){

if(videoURL){

window.open(videoURL)

}

}

function downloadMP3(){

if(audioURL){

window.open(audioURL)

}

}

</script>

</body>
</html>
