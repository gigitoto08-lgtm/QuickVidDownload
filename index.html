<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>QuickVideoDownloader - Download TikTok, Instagram, X & YouTube Videos</title>

<meta name="description" content="Download videos from TikTok, Instagram, X (Twitter) and YouTube in HD quality for free.">
<meta name="keywords" content="tiktok downloader, instagram reels downloader, youtube downloader, twitter video download">
<meta name="robots" content="index, follow">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>

body{
font-family:Inter;
background:#0d071a;
color:white;
margin:0;
}

.wrapper{
max-width:1100px;
margin:auto;
padding:40px 20px;
}

.logo{
font-size:30px;
font-weight:700;
margin-bottom:30px;
}

.card{
background:#1c1030;
padding:30px;
border-radius:20px;
}

.input-area{
display:flex;
gap:10px;
}

input{
flex:1;
padding:14px;
border-radius:40px;
border:none;
font-size:16px;
}

button{
padding:14px 25px;
border:none;
border-radius:40px;
background:#8e5cff;
color:white;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#a77aff;
}

.preview{
margin-top:25px;
display:none;
}

.preview img{
width:100%;
max-width:350px;
border-radius:15px;
}

.download-area{
margin-top:20px;
display:none;
}

select{
padding:10px;
border-radius:20px;
border:none;
margin-right:10px;
}

footer{
margin-top:40px;
opacity:.7;
}

</style>

</head>

<body>

<div class="wrapper">

<div class="logo">QuickVideoDownloader</div>

<div class="card">

<div class="input-area">

<input id="urlInput" placeholder="Paste TikTok / Instagram / X / YouTube link">

<button id="pasteBtn"><i class="fa fa-paste"></i></button>

<button id="analyzeBtn">Analyze</button>

</div>

<div class="preview" id="preview">

<h3>Video preview</h3>

<img id="thumb">

</div>

<div class="download-area" id="downloadArea">

<select id="quality">
<option value="720">HD 720p</option>
<option value="1080">Full HD 1080p</option>
</select>

<button id="downloadBtn"><i class="fa fa-download"></i> Download</button>

</div>

</div>

<footer>

© 2025 QuickVideoDownloader

</footer>

</div>

<script>

const urlInput=document.getElementById("urlInput");
const pasteBtn=document.getElementById("pasteBtn");
const analyzeBtn=document.getElementById("analyzeBtn");
const preview=document.getElementById("preview");
const thumb=document.getElementById("thumb");
const downloadArea=document.getElementById("downloadArea");
const downloadBtn=document.getElementById("downloadBtn");

let videoURL="";

pasteBtn.onclick=async()=>{

try{

const text=await navigator.clipboard.readText();

urlInput.value=text;

}catch{

alert("Clipboard not allowed");

}

}

function detectPlatform(url){

if(url.includes("tiktok")) return "tiktok";
if(url.includes("instagram")) return "instagram";
if(url.includes("twitter") || url.includes("x.com")) return "twitter";
if(url.includes("youtube") || url.includes("youtu.be")) return "youtube";

return null;

}

analyzeBtn.onclick=async()=>{

const url=urlInput.value.trim();

if(!url){

alert("Paste link first");

return;

}

const platform=detectPlatform(url);

if(!platform){

alert("Unsupported link");

return;

}

try{

if(platform==="tiktok"){

const api="https://tikwm.com/api/?url="+encodeURIComponent(url);

const res=await fetch(api);

const data=await res.json();

videoURL=data.data.play;

thumb.src=data.data.cover;

}

else{

thumb.src="https://img.youtube.com/vi/"+url.split("v=")[1]+"/0.jpg";

videoURL=url;

}

preview.style.display="block";

downloadArea.style.display="block";

}catch{

alert("Failed to fetch video");

}

}

downloadBtn.onclick=()=>{

if(videoURL){

window.open(videoURL);

}

}

</script>

</body>

</html>
