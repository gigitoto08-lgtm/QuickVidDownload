<script>

const urlInput=document.getElementById("urlInput");
const pasteBtn=document.getElementById("pasteBtn");
const analyzeBtn=document.getElementById("analyzeBtn");
const preview=document.getElementById("preview");
const thumb=document.getElementById("thumb");
const downloadArea=document.getElementById("downloadArea");
const downloadBtn=document.getElementById("downloadBtn");
const counter=document.getElementById("count");

let videoURL="";

pasteBtn.onclick=async()=>{
try{
const text=await navigator.clipboard.readText();
urlInput.value=text;
}catch{
alert("Clipboard not allowed");
}
}

analyzeBtn.onclick=async()=>{

const url=urlInput.value.trim();

if(!url){
alert("Paste link first");
return;
}

try{

const res = await fetch("https://api.cobalt.tools/api/json",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({url:url})
});

const data = await res.json();

if(data.url){

videoURL=data.url;

thumb.src=data.thumbnail || "";
preview.style.display="block";
downloadArea.style.display="block";

}else{
alert("Video not supported");
}

}catch{
alert("Failed to analyze video");
}

}

downloadBtn.onclick=()=>{

if(videoURL){

window.open(videoURL);

let c=parseInt(counter.innerText);
counter.innerText=c+1;

}

}

let currentDownloads = 12482;

setInterval(()=>{
currentDownloads += Math.floor(Math.random()*3);
counter.innerText = currentDownloads;
},4000);

</script>
