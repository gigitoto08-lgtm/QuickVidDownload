<script>

const urlInput=document.getElementById("urlInput");
const pasteBtn=document.getElementById("pasteBtn");
const preview=document.getElementById("preview");
const thumb=document.getElementById("thumb");
const player=document.getElementById("player");
const author=document.getElementById("author");
const duration=document.getElementById("duration");
const downloadArea=document.getElementById("downloadArea");
const downloadBtn=document.getElementById("downloadBtn");
const mp3Btn=document.getElementById("mp3Btn");
const loading=document.getElementById("loading");
const counter=document.getElementById("count");

let videoURL="";
let audioURL="";

pasteBtn.onclick=async()=>{

try{
const text=await navigator.clipboard.readText();
urlInput.value=text;
analyzeVideo();
}catch{
alert("Clipboard not allowed");
}

}

urlInput.addEventListener("change",analyzeVideo);

async function analyzeVideo(){

const url=urlInput.value.trim();

if(!url) return;

loading.style.display="block";

try{

const api="https://api.tiklydown.eu.org/api/download?url="+encodeURIComponent(url);

const res=await fetch(api);

const data=await res.json();

loading.style.display="none";

if(data && data.video){

videoURL=data.video;
audioURL=data.music || data.video;

thumb.src=data.cover || "";
player.src=videoURL;

author.innerText="👤 Author: "+(data.author || "Unknown");
duration.innerText="⏱ Duration: "+(data.duration || "Unknown")+" sec";

preview.style.display="block";
downloadArea.style.display="block";

}

}catch{

loading.style.display="none";
alert("Failed to analyze video");

}

}

downloadBtn.onclick=()=>{

if(videoURL){

window.open(videoURL);

let c=parseInt(counter.innerText);

counter.innerText=c+1;

}

}

mp3Btn.onclick=()=>{

if(audioURL){
window.open(audioURL);
}

}

let downloads=12482;

setInterval(()=>{

downloads+=Math.floor(Math.random()*4);
counter.innerText=downloads;

},4000);

</script>
